<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المحاضرات والامتحانات</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    /* الكود الخاص بك كما هو تماماً دون أي تغيير */
    body {
      background-color: #0f1117;
      color: white;
      font-family: 'Cairo', sans-serif;
      margin: 0; padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      cursor: pointer;
    }
    .tab {
      padding: 10px 20px;
      border-bottom: 3px solid transparent;
      font-weight: bold;
      color: #aaa;
      transition: color 0.3s, border-color 0.3s;
    }
    .tab.active {
      border-color: #d4af37;
      color: white;
    }
    .content {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .empty-state {
      text-align: center;
      margin-top: 50px;
      width: 100%;
    }
    .empty-state img {
      width: 80px;
      opacity: 0.7;
      margin-bottom: 20px;
    }
    .empty-state h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .empty-state p {
      color: #8b9aa7;
      font-size: 14px;
    }
    .note-item {
      background: #1a1c22;
      border-radius: 12px;
      padding: 15px;
      width: calc(33.33% - 20px); 
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: white;
      box-shadow: 0 0 8px #333;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin: 20px;
    }
    .note-item:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px #d4af37;
    }
    .note-title {
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      margin-bottom: 10px;
    }
    video {
      width: 100%;
      height: auto;
      border-radius: 12px;
      background: black;
    }
    .note-icon {
      width: 50px;
      margin-bottom: 10px;
    }

    #lock-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0f1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .lock-box {
      background: #1a1c22;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
    }
    #pass-input {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #d4af37;
      background: #0f1117;
      color: white;
      margin-bottom: 15px;
      width: 200px;
      text-align: center;
    }
    #pass-btn {
      padding: 10px 25px;
      background: #d4af37;
      border: none;
      border-radius: 5px;
      color: #0f1117;
      font-weight: bold;
      cursor: pointer;
    }

    @media screen and (max-width: 900px) {
      .note-item { width: calc(50% - 20px); }
    }
    @media screen and (max-width: 600px) {
      .note-item { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-box">
      <h2>محتوى محمي</h2>
      <p>أدخل كود التفعيل الخاص بك</p>
      <input type="password" id="pass-input" placeholder="ادخل الكود هنا">
      <br>
      <button id="pass-btn" onclick="validatePass()">تفعيل</button>
      <p id="error-msg" style="color: red; margin-top: 10px;"></p>
    </div>
  </div>

  <div class="tabs">
    <div id="tabLectures" class="tab active">المحاضرات</div>
    <div id="tabExams" class="tab">الامتحانات</div>
  </div>

  <div id="contentLectures" class="content"></div>
  <div id="contentExams" class="content" style="display:none;"></div>

  <script>
    // --- إعدادات Firebase الخاصة بك كما في الصورة ---
    const firebaseConfig = {
      apiKey: "AIzaSyDR0P95U7O-6lzoCkYWrXH1pKmDEFRJh0",
      authDomain: "password-cd32b.firebaseapp.com",
      databaseURL: "https://password-cd32b-default-rtdb.firebaseio.com",
      projectId: "password-cd32b",
      storageBucket: "password-cd32b.firebasestorage.app",
      messagingSenderId: "26391483654",
      appId: "1:26391483654:web:a9985e0feee2b519fe7a87",
      measurementId: "G-BEKFRKCZRS"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // وظيفة التحقق المعدلة للعمل مع قاعدة البيانات
    async function validatePass() {
      const input = document.getElementById('pass-input').value.trim();
      const error = document.getElementById('error-msg');
      const btn = document.getElementById('pass-btn');

      if (!input) return;

      btn.innerText = "جاري التحقق...";
      btn.disabled = true;

      try {
        // التحقق من وجود الكود وحالته في Firebase
        const snapshot = await database.ref('codes/' + input).once('value');
        const status = snapshot.val();

        if (status === "active") {
          // الكود صحيح وغير مستخدم: اجعله "مستخدماً" فوراً
          await database.ref('codes/' + input).set("used");
          
          localStorage.setItem('isUnlocked', 'true'); // تذكر الجهاز
          document.getElementById('lock-screen').style.display = 'none';
        } else if (status === "used") {
          error.innerText = "هذا الكود تم استخدامه مسبقاً من جهاز آخر!";
        } else {
          error.innerText = "هذا الكود غير صحيح!";
        }
      } catch (err) {
        error.innerText = "خطأ في الاتصال، حاول مرة أخرى.";
      } finally {
        btn.innerText = "تفعيل";
        btn.disabled = false;
      }
    }

    // التحقق التلقائي عند فتح الصفحة
    window.onload = function() {
      if (localStorage.getItem('isUnlocked') === 'true') {
        document.getElementById('lock-screen').style.display = 'none';
      }
      // رندر المحتوى الأصلي
      renderNotes(contentLectures, lectures, "لا توجد محاضرات متاحة", "lecture");
      renderNotes(contentExams, exams, "لا توجد امتحانات متاحة", "exam");
    };

    // --- بقية كودك الأصلي كما هو تماماً لضمان عدم تغير الشكل ---
    const lectures = [
      { title: "محاضرة الرياضيات", url: "فديوهات/responsive dashboard using html and css only _ تصميم لوحة تحكم متجاوبة(720P_HD).mp4" },
    ];

    const exams = [
      { title: "امتحان الوحدة الأولى", url: "مذكرات/اول درس رياضه.pdf" },
    ];

    const tabLectures = document.getElementById('tabLectures');
    const tabExams = document.getElementById('tabExams');
    const contentLectures = document.getElementById('contentLectures');
    const contentExams = document.getElementById('contentExams');

    function createLectureItem(note) {
      const div = document.createElement('div');
      div.className = "note-item";
      div.innerHTML = `
        <div class="note-title">${note.title}</div>
        <video controls controlsList="nodownload">
          <source src="${note.url}" type="video/mp4">
          المتصفح لا يدعم عرض الفيديو.
        </video>
      `;
      return div;
    }

    function createExamItem(note) {
      const a = document.createElement('a');
      a.href = note.url;
      a.target = "_blank";
      a.className = "note-item";
      a.innerHTML = `
        <img class="note-icon" src="https://cdn-icons-png.flaticon.com/512/337/337946.png" alt="pdf icon">
        <div class="note-title">${note.title}</div>
      `;
      return a;
    }

    function renderNotes(container, notesArray, emptyMessage, type="lecture") {
      container.innerHTML = "";
      if(notesArray.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" alt="مذكرة">
            <h2>${emptyMessage}</h2>
            <p>سيتم إضافة المحتوى قريبًا</p>
          </div>
        `;
      } else {
        notesArray.forEach(note => {
          if(type === "lecture") container.appendChild(createLectureItem(note));
          else container.appendChild(createExamItem(note));
        });
      }
    }

    tabLectures.addEventListener('click', () => {
      tabLectures.classList.add('active');
      tabExams.classList.remove('active');
      contentLectures.style.display = 'flex';
      contentExams.style.display = 'none';
    });

    tabExams.addEventListener('click', () => {
      tabExams.classList.add('active');
      tabLectures.classList.remove('active');
      contentExams.style.display = 'flex';
      contentLectures.style.display = 'none';
    });
  </script>

</body>
</html>
