<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنصة التعليمية - لوحة التحكم</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      background-color: #0f1117;
      color: white;
      font-family: 'Cairo', sans-serif;
      margin: 0; padding: 20px;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .tabs { display: flex; gap: 20px; margin-bottom: 30px; cursor: pointer; }
    .tab { padding: 10px 20px; border-bottom: 3px solid transparent; font-weight: bold; color: #aaa; transition: 0.3s; }
    .tab.active { border-color: #d4af37; color: white; }
    .content { width: 100%; max-width: 1000px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .note-item { background: #1a1c22; border-radius: 12px; padding: 15px; width: calc(33.33% - 20px); display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; color: white; box-shadow: 0 0 8px #333; transition: 0.2s; margin: 10px; }
    .note-item:hover { transform: scale(1.02); box-shadow: 0 0 15px #d4af37; }
    .note-title { font-weight: bold; font-size: 16px; text-align: center; margin-bottom: 10px; }
    video { width: 100%; border-radius: 12px; background: black; }
    .note-icon { width: 50px; margin-bottom: 10px; }

    /* شاشة القفل */
    #lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f1117; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
    }
    .lock-box { background: #1a1c22; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
    #pass-input { padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: #0f1117; color: white; margin-bottom: 15px; width: 80%; text-align: center; font-size: 18px; }
    #pass-btn { padding: 10px 30px; background: #d4af37; border: none; border-radius: 8px; color: #0f1117; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
    #pass-btn:disabled { background: #555; cursor: not-allowed; }

    @media screen and (max-width: 900px) { .note-item { width: calc(50% - 20px); } }
    @media screen and (max-width: 600px) { .note-item { width: 100%; } }
  </style>
</head>
<body>

  <div id="lock-screen">
    <div class="lock-box">
      <h2 style="color: #d4af37;">دخول الطلاب</h2>
      <p>ادخل كود الاشتراك الخاص بك للمتابعة</p>
      <input type="text" id="pass-input" placeholder="ادخل الكود هنا">
      <br>
      <button id="pass-btn" onclick="validatePass()">تفعيل الآن</button>
      <p id="error-msg" style="color: #ff4d4d; margin-top: 15px; font-weight: bold;"></p>
    </div>
  </div>

  <div class="tabs">
    <div id="tabLectures" class="tab active">المحاضرات</div>
    <div id="tabExams" class="tab">الامتحانات</div>
  </div>

  <div id="contentLectures" class="content"></div>
  <div id="contentExams" class="content" style="display:none;"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDR0P95U7O-6lzoCkYWrXH1pKmDEFRJh0",
      authDomain: "password-cd32b.firebaseapp.com",
      databaseURL: "https://password-cd32b-default-rtdb.firebaseio.com",
      projectId: "password-cd32b",
      storageBucket: "password-cd32b.firebasestorage.app",
      messagingSenderId: "26391483654",
      appId: "1:26391483654:web:a9985e0feee2b519fe7a87"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // فحص الحالة عند فتح الصفحة (نظام الطرد)
    window.onload = async function() {
      const savedCode = localStorage.getItem('userCode_v5');
      
      if (savedCode) {
        try {
          const snapshot = await database.ref('codes/' + savedCode).once('value');
          const status = snapshot.val();

          // لو الكود اتمسح من فيربيز أو مابقاش used، اقفل الموقع
          if (status === "used") {
            document.getElementById('lock-screen').style.display = 'none';
          } else {
            localStorage.removeItem('userCode_v5');
            document.getElementById('lock-screen').style.display = 'flex';
          }
        } catch (err) {
          console.error("خطأ في الاتصال");
        }
      }
      renderNotes(contentLectures, lectures, "لا توجد محاضرات حالياً", "lecture");
      renderNotes(contentExams, exams, "لا توجد امتحانات حالياً", "exam");
    };

    async function validatePass() {
      const input = document.getElementById('pass-input').value.trim().toLowerCase();
      const error = document.getElementById('error-msg');
      const btn = document.getElementById('pass-btn');

      if (!input) return;
      btn.innerText = "جاري التحقق...";
      btn.disabled = true;

      try {
        const snapshot = await database.ref('codes/' + input).once('value');
        const status = snapshot.val();

        if (status === "active") {
          await database.ref('codes/' + input).set("used");
          localStorage.setItem('userCode_v5', input); // تخزين الكود للتحقق المستمر
          document.getElementById('lock-screen').style.display = 'none';
        } else if (status === "used") {
          error.innerText = "هذا الكود مستخدم من قبل!";
        } else {
          error.innerText = "الكود غير صحيح!";
        }
      } catch (err) {
        error.innerText = "خطأ في الشبكة!";
      } finally {
        btn.innerText = "تفعيل الآن";
        btn.disabled = false;
      }
    }

    // --- البيانات والمحتوى ---
    const lectures = [
      { title: "المحاضرة الأولى", url: "فديوهات/video1.mp4" },
    ];
    const exams = [
      { title: "امتحان الشهر", url: "مذكرات/test.pdf" },
    ];

    const tabLectures = document.getElementById('tabLectures');
    const tabExams = document.getElementById('tabExams');
    const contentLectures = document.getElementById('contentLectures');
    const contentExams = document.getElementById('contentExams');

    function renderNotes(container, notesArray, emptyMessage, type) {
      container.innerHTML = "";
      if (notesArray.length === 0) {
        container.innerHTML = `<div class="empty-state"><h3>${emptyMessage}</h3></div>`;
        return;
      }
      notesArray.forEach(note => {
        const item = document.createElement(type === "lecture" ? 'div' : 'a');
        item.className = "note-item";
        if (type === "lecture") {
          item.innerHTML = `<div class="note-title">${note.title}</div><video controls><source src="${note.url}" type="video/mp4"></video>`;
        } else {
          item.href = note.url; item.target = "_blank";
          item.innerHTML = `<img class="note-icon" src="https://cdn-icons-png.flaticon.com/512/337/337946.png"><div class="note-title">${note.title}</div>`;
        }
        container.appendChild(item);
      });
    }

    tabLectures.addEventListener('click', () => {
      tabLectures.classList.add('active'); tabExams.classList.remove('active');
      contentLectures.style.display = 'flex'; contentExams.style.display = 'none';
    });
    tabExams.addEventListener('click', () => {
      tabExams.classList.add('active'); tabLectures.classList.remove('active');
      contentExams.style.display = 'flex'; contentLectures.style.display = 'none';
    });
  </script>
</body>
</html>
